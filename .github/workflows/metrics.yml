name: 📊 Metrics

on:
  # Run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Also run on every push to main
  push:
    branches: [main, master]

jobs:
  github-metrics:
    name: Generate Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📊 Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          # ── Core ──────────────────────────────────────────────
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayon7544
          filename: metrics.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: 📊 auto-update metrics [skip ci]"
          output_action: commit
          delay: 120

          # ── Base Config ────────────────────────────────────────
          config_timezone: Asia/Dhaka
          config_order: base.header, base.activity+community, base.repositories, languages, achievements, habits, calendar
          config_padding: 6%, 10 + 3%

          # ── Aesthetics ─────────────────────────────────────────
          config_display: large
          config_animations: yes

          # ── Base Plugin ────────────────────────────────────────
          plugin_base: yes
          plugin_base_sections: header, activity, community, repositories, metadata

          # ── Languages Plugin ───────────────────────────────────
          # Shows language distribution across ALL your repos dynamically
          plugin_languages: yes
          plugin_languages_ignored: html, css, makefile, dockerfile, shell
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_sections: most-used, recently-used
          plugin_languages_colors: github
          plugin_languages_categories: markup, programming
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 12

          # ── Achievements Plugin ────────────────────────────────
          # Auto-detects your GitHub achievements dynamically
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

          # ── Habits Plugin ──────────────────────────────────────
          # Analyzes your actual commit patterns dynamically
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: bar
          plugin_habits_trim: yes

          # ── Calendar Plugin ────────────────────────────────────
          # Full-year contribution calendar — fully dynamic
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # ── Stars Plugin ───────────────────────────────────────
          plugin_stars: yes
          plugin_stars_limit: 4

          # ── Topics Plugin ──────────────────────────────────────
          # Auto-pulls topics from repos you've starred
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_limit: 15
          plugin_topics_mode: icons
